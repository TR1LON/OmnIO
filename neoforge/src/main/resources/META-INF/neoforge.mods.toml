modLoader = "javafml"
loaderVersion = "${neoforge_loader_version_range}"
license = "${mod_license}"
issueTrackerURL = "https://github.com/Trilon/OmnIO/issues"

[[mods]]
modId = "${mod_id}"
version = "${mod_version}"
